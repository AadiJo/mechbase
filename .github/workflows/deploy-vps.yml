name: Deploy backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull and restart backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            BACKEND_PATH="/mnt/block-volume/mechbase-rag-8642/repo"
            SERVICE_NAME="mechbase-rag-8642.service"
            ARTIFACT_SOURCE="$BACKEND_PATH/artifacts"

            cd "$BACKEND_PATH"

            git fetch origin main
            git reset --hard origin/main

            sudo mkdir -p /app
            sudo ln -sfn "$ARTIFACT_SOURCE" /app/artifacts

            . .venv/bin/activate
            pip install -e .

            sudo systemctl restart "$SERVICE_NAME"
            systemctl is-active --quiet "$SERVICE_NAME"

            curl -fsS http://127.0.0.1:8642/health
            curl -fsS https://api-frcrag-v2.johari-dev.com/health
